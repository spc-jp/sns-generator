<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNS投稿ジェネレーター</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-dark: #225AD3;
    --blue-light: #0179E8;
    --blue-pale: #EBF3FF;
    --x-color: #000000;
    --threads-color: #101010;
    --insta-color: #E1306C;
    --note-color: #41C9B4;
    --bg: #F4F7FF;
    --card: #FFFFFF;
    --text: #1A1A2E;
    --muted: #7A8AAA;
    --radius: 16px;
    --shadow: 0 4px 24px rgba(34,90,211,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px 0;
  }

  header {
    background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-light) 100%);
    padding: 28px 24px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    width: 300px; height: 300px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
    top: -100px; right: -60px;
  }

  header h1 {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.05em;
    position: relative;
  }

  header p {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    margin-top: 6px;
    position: relative;
  }

  .badge {
    display: inline-block;
    background: rgba(255,255,255,0.18);
    color: #fff;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
    position: relative;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px;
  }

  .input-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px;
    margin-top: 20px;
    border: 1px solid rgba(34,90,211,0.08);
  }

  .input-card h2 {
    font-size: 14px;
    font-weight: 700;
    color: var(--blue-dark);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .field {
    margin-bottom: 14px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }

  input[type="text"], textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #E0E8F8;
    border-radius: 10px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--blue-pale);
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }

  input[type="text"]:focus, textarea:focus {
    border-color: var(--blue-light);
    background: #fff;
  }

  .generate-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--blue-dark), var(--blue-light));
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 0.06em;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .generate-btn:active { transform: scale(0.98); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .generate-btn .shimmer {
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    animation: shimmer 1.5s infinite;
  }

  @keyframes shimmer {
    0% { left: -100%; }
    100% { left: 100%; }
  }

  .loading-area {
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 14px;
    display: none;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #E0E8F8;
    border-top-color: var(--blue-light);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .results-area { margin-top: 20px; display: none; }

  .result-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 16px;
    overflow: hidden;
    border: 1px solid rgba(34,90,211,0.06);
    animation: fadeUp 0.4s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card:nth-child(1) { animation-delay: 0.05s; }
  .result-card:nth-child(2) { animation-delay: 0.15s; }
  .result-card:nth-child(3) { animation-delay: 0.25s; }
  .result-card:nth-child(4) { animation-delay: 0.35s; }

  .card-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #F0F4FF;
  }

  .card-header.x-header { background: #0a0a0a; color: #fff; }
  .card-header.threads-header { background: #1a1a1a; color: #fff; }
  .card-header.insta-header { background: linear-gradient(90deg, #833ab4, #fd1d1d, #fcb045); color: #fff; }
  .card-header.note-header { background: linear-gradient(90deg, #2ba891, #41c9b4); color: #fff; }

  .card-header .plat-name {
    font-weight: 900;
    font-size: 14px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
  }

  .card-header .plat-icon { font-size: 20px; }

  .char-limit {
    margin-left: auto;
    font-size: 11px;
    opacity: 0.75;
    background: rgba(255,255,255,0.15);
    padding: 2px 8px;
    border-radius: 20px;
  }

  .card-body {
    padding: 18px;
  }

  .post-text {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 80px;
  }

  .char-count {
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    text-align: right;
  }

  .char-count.over { color: #E74C3C; font-weight: 700; }

  .card-actions {
    padding: 12px 18px 16px;
    display: flex;
    gap: 8px;
    border-top: 1px solid #F0F4FF;
  }

  .copy-btn {
    flex: 1;
    padding: 10px;
    border: 1.5px solid #E0E8F8;
    border-radius: 8px;
    background: var(--blue-pale);
    color: var(--blue-dark);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .copy-btn:hover { background: var(--blue-dark); color: #fff; border-color: var(--blue-dark); }
  .copy-btn.copied { background: #27AE60; color: #fff; border-color: #27AE60; }

  .regen-btn {
    padding: 10px 14px;
    border: 1.5px solid #E0E8F8;
    border-radius: 8px;
    background: #fff;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .regen-btn:hover { border-color: var(--blue-light); color: var(--blue-dark); }

  .tips-bar {
    background: linear-gradient(90deg, rgba(34,90,211,0.08), rgba(1,121,232,0.06));
    border-radius: 10px;
    padding: 12px 16px;
    margin: 0 18px 12px;
    font-size: 12px;
    color: var(--blue-dark);
    line-height: 1.6;
    border-left: 3px solid var(--blue-light);
  }

  .error-msg {
    background: #FFF0F0;
    border: 1px solid #FFD0D0;
    border-radius: 10px;
    padding: 14px 16px;
    color: #C0392B;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  .platform-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }

  .ptag {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 700;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.15s;
  }

  .ptag-x { background: #f0f0f0; color: #222; }
  .ptag-x.on { background: #111; color: #fff; border-color: #111; }
  .ptag-threads { background: #f5f5f5; color: #555; }
  .ptag-threads.on { background: #333; color: #fff; border-color: #333; }
  .ptag-insta { background: #fff0f5; color: var(--insta-color); }
  .ptag-insta.on { background: var(--insta-color); color: #fff; border-color: var(--insta-color); }
  .ptag-note { background: #f0fdfb; color: #1a9a8a; }
  .ptag-note.on { background: var(--note-color); color: #fff; border-color: var(--note-color); }

  footer {
    text-align: center;
    padding: 24px 0 0;
    font-size: 11px;
    color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <div class="badge">✨ みっけシリーズ 公式ツール</div>
  <h1>📣 SNS投稿ジェネレーター</h1>
  <p>アプリ名とURLを入れるだけで、4媒体の投稿文が完成</p>
</header>

<div class="container">
  <div class="input-card">
    <h2>📝 アプリ情報を入力</h2>

    <div class="field">
      <label>アプリ名 *</label>
      <input type="text" id="appName" placeholder="例：採用みっけ　/　ひとり社長の経営会議室" />
    </div>

    <div class="field">
      <label>URL *</label>
      <input type="text" id="appUrl" placeholder="https://spc-jp.github.io/..." />
    </div>

    <div class="field">
      <label>アプリの説明・ひと言メモ（任意）</label>
      <textarea id="appDesc" rows="3" placeholder="例：中小企業の採用担当者向けに、求人票のポイントをAIがアドバイス。無料でお試しできます。"></textarea>
    </div>

    <div class="field">
      <label>対象読者・ターゲット（任意）</label>
      <input type="text" id="appTarget" placeholder="例：税理士事務所の先生、ひとり社長、飲食店オーナー" />
    </div>

    <div class="field">
      <label>生成する媒体を選択</label>
      <div class="platform-tags">
        <span class="ptag ptag-x on" data-plat="x" onclick="togglePlat(this)">𝕏 X（Twitter）</span>
        <span class="ptag ptag-threads on" data-plat="threads" onclick="togglePlat(this)">🧵 Threads</span>
        <span class="ptag ptag-insta on" data-plat="insta" onclick="togglePlat(this)">📷 Instagram</span>
        <span class="ptag ptag-note on" data-plat="note" onclick="togglePlat(this)">📝 note</span>
      </div>
    </div>

    <button class="generate-btn" id="genBtn" onclick="generate()">
      <span class="shimmer"></span>
      🚀 SNS投稿を生成する
    </button>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="loading-area" id="loadingArea">
    <div class="spinner"></div>
    <div id="loadingText">AIが投稿文を考えています...</div>
  </div>

  <div class="results-area" id="resultsArea"></div>

  <footer>Powered by Claude API ｜ Smile Plus Consulting</footer>
</div>

<script>
const WORKER_URL = 'https://sns-generator-api.yymmatsu.workers.dev';

const PLATFORMS = {
  x: {
    name: 'X（Twitter）',
    icon: '𝕏',
    limit: 140,
    headerClass: 'x-header',
    tip: '投稿直後30分の反応がカギ。リプライにも必ず返信を！'
  },
  threads: {
    name: 'Threads',
    icon: '🧵',
    limit: 500,
    headerClass: 'threads-header',
    tip: 'フォロワー外にも届きやすい。返信・引用を積極的に。'
  },
  insta: {
    name: 'Instagram',
    icon: '📷',
    limit: 2200,
    headerClass: 'insta-header',
    tip: 'キャプションより「保存したくなる」内容が拡散の鍵。'
  },
  note: {
    name: 'note',
    icon: '📝',
    limit: null,
    headerClass: 'note-header',
    tip: '読了率を上げるため、冒頭3行で読者の心をつかもう。'
  }
};

const activePlats = new Set(['x', 'threads', 'insta', 'note']);

function togglePlat(el) {
  const plat = el.dataset.plat;
  if (activePlats.has(plat)) {
    if (activePlats.size <= 1) return;
    activePlats.delete(plat);
    el.classList.remove('on');
  } else {
    activePlats.add(plat);
    el.classList.add('on');
  }
}

const loadingMessages = [
  'アプリの魅力を分析中...',
  '各SNSのアルゴリズムを考慮中...',
  'ターゲットに刺さる言葉を選んでいます...',
  'もう少しで完成です！'
];

async function generate() {
  const appName = document.getElementById('appName').value.trim();
  const appUrl = document.getElementById('appUrl').value.trim();
  const appDesc = document.getElementById('appDesc').value.trim();
  const appTarget = document.getElementById('appTarget').value.trim();
  const errorMsg = document.getElementById('errorMsg');

  errorMsg.style.display = 'none';

  if (!appName || !appUrl) {
    errorMsg.textContent = '⚠️ アプリ名とURLは必須です。入力してください。';
    errorMsg.style.display = 'block';
    return;
  }

  if (activePlats.size === 0) {
    errorMsg.textContent = '⚠️ 生成する媒体を1つ以上選択してください。';
    errorMsg.style.display = 'block';
    return;
  }

  const btn = document.getElementById('genBtn');
  const loadingArea = document.getElementById('loadingArea');
  const resultsArea = document.getElementById('resultsArea');

  btn.disabled = true;
  loadingArea.style.display = 'block';
  resultsArea.style.display = 'none';
  resultsArea.innerHTML = '';

  let msgIdx = 0;
  const loadingText = document.getElementById('loadingText');
  const loadingInterval = setInterval(() => {
    msgIdx = (msgIdx + 1) % loadingMessages.length;
    loadingText.textContent = loadingMessages[msgIdx];
  }, 1800);

  const platList = [...activePlats];
  const platDescriptions = {
    x: 'X（旧Twitter）：140文字以内。改行・絵文字を活用し、インパクトのある一言から始め、URLで締める。ハッシュタグは1〜2個。',
    threads: 'Threads：500文字以内。少し長めの語りかけ口調で、共感を生む内容に。絵文字を自然に使う。',
    insta: 'Instagram：キャプション（500文字以内推奨）。改行を多く使い読みやすく。保存したくなる有益情報を入れる。ハッシュタグは末尾に5〜10個。',
    note: 'note：リード文（冒頭200文字程度）として機能するテキスト。読み手が続きを読みたくなる書き出し。URLへの誘導で締める。'
  };

  const platInstructions = platList.map(p => `【${PLATFORMS[p].name}】\n${platDescriptions[p]}`).join('\n\n');

  const prompt = `あなたはSNSマーケティングの専門家です。
以下のWebアプリの情報をもとに、各SNS媒体向けの投稿文を生成してください。

アプリ名：${appName}
URL：${appUrl}
${appDesc ? `説明：${appDesc}` : ''}
${appTarget ? `ターゲット：${appTarget}` : ''}

投稿者プロフィール：68歳のフリーランスWebマーケター。「中小企業の宝探し」をモットーに、AIを活用した中小企業支援を20年以上行っている。温かみのある語り口で、専門用語を使わないわかりやすい発信が特徴。

以下の各SNS向けに投稿文を生成してください：

${platInstructions}

出力形式：
以下のJSON形式のみで返してください。説明文や前後の文章は一切不要です。
{
${platList.map(p => `  "${p}": "投稿テキスト"`).join(',\n')}
}

注意事項：
- 自然でSNSらしい日本語で書く
- 絵文字を適度に使う（多すぎず少なすぎず）
- 宣伝くさくなく、価値提供を前面に出す
- 文字数制限を必ず守る（Xは特に140文字以内厳守）
- URLは必ず含める`;

  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `APIエラー: ${response.status}`);
    }

    const data = await response.json();
    const rawText = data.content.map(c => c.text || '').join('');

    const jsonMatch = rawText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('レスポンスの解析に失敗しました。再度お試しください。');

    const posts = JSON.parse(jsonMatch[0]);

    clearInterval(loadingInterval);
    loadingArea.style.display = 'none';

    resultsArea.style.display = 'block';
    platList.forEach(plat => {
      if (!posts[plat]) return;
      const text = posts[plat];
      const p = PLATFORMS[plat];
      const charCount = [...text].length;
      const isOver = p.limit && charCount > p.limit;

      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `
        <div class="card-header ${p.headerClass}">
          <span class="plat-icon">${p.icon}</span>
          <span class="plat-name">${p.name}</span>
          ${p.limit ? `<span class="char-limit">${p.limit}文字以内</span>` : '<span class="char-limit">文字数制限なし</span>'}
        </div>
        <div class="card-body">
          <div class="post-text" id="post-${plat}">${escapeHtml(text)}</div>
          <div class="char-count ${isOver ? 'over' : ''}">${charCount}文字${isOver ? '（⚠️ 超過）' : ''}</div>
        </div>
        <div class="tips-bar">💡 ${p.tip}</div>
        <div class="card-actions">
          <button class="copy-btn" onclick="copyPost('${plat}', this)">📋 コピー</button>
          <button class="regen-btn" onclick="regenSingle('${plat}', '${escapeAttr(appName)}', '${escapeAttr(appUrl)}', '${escapeAttr(appDesc)}', '${escapeAttr(appTarget)}')">🔄 再生成</button>
        </div>
      `;
      resultsArea.appendChild(card);
    });

  } catch (err) {
    clearInterval(loadingInterval);
    loadingArea.style.display = 'none';
    errorMsg.textContent = '❌ ' + (err.message || 'エラーが発生しました。再度お試しください。');
    errorMsg.style.display = 'block';
  }

  btn.disabled = false;
}

async function regenSingle(plat, appName, appUrl, appDesc, appTarget) {
  const postEl = document.getElementById('post-' + plat);
  if (!postEl) return;
  postEl.textContent = '再生成中...';

  const platDescriptions = {
    x: 'X（旧Twitter）：140文字以内。改行・絵文字を活用し、インパクトのある一言から始め、URLで締める。ハッシュタグは1〜2個。',
    threads: 'Threads：500文字以内。少し長めの語りかけ口調で、共感を生む内容に。絵文字を自然に使う。',
    insta: 'Instagram：キャプション（500文字以内推奨）。改行を多く使い読みやすく。保存したくなる有益情報を入れる。ハッシュタグは末尾に5〜10個。',
    note: 'note：リード文（冒頭200文字程度）として機能するテキスト。読み手が続きを読みたくなる書き出し。URLへの誘導で締める。'
  };

  const prompt = `あなたはSNSマーケティングの専門家です。
アプリ名：${appName}、URL：${appUrl}
${appDesc ? `説明：${appDesc}` : ''}
${appTarget ? `ターゲット：${appTarget}` : ''}

投稿者：68歳フリーランスWebマーケター。温かみのある語り口。

【${PLATFORMS[plat].name}】向け投稿文を1つだけ生成してください。
${platDescriptions[plat]}

前回と異なるアプローチで書いてください。
投稿文のテキストのみを返してください。説明や前置きは不要です。`;

  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        max_tokens: 400,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const text = (data.content || []).map(c => c.text || '').join('').trim();
    postEl.textContent = text;

    const p = PLATFORMS[plat];
    const charCount = [...text].length;
    const countEl = postEl.parentElement.querySelector('.char-count');
    if (countEl) {
      const isOver = p.limit && charCount > p.limit;
      countEl.textContent = `${charCount}文字${isOver ? '（⚠️ 超過）' : ''}`;
      countEl.className = 'char-count' + (isOver ? ' over' : '');
    }
  } catch (e) {
    postEl.textContent = '再生成に失敗しました。もう一度お試しください。';
  }
}

function copyPost(plat, btn) {
  const el = document.getElementById('post-' + plat);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    btn.textContent = '✅ コピー済み！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 コピー';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function escapeHtml(str) {
  return String(str || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function escapeAttr(str) {
  return String(str || '').replace(/'/g, "\\'");
}
</script>
